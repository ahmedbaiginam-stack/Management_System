version: '3.8'

services:
  # Database Service
  mongodb:
    image: mongo:6.0
    container_name: lms-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  # Spring Boot Backend API Service
  backend:
    build: ./lms-backend
    container_name: lms-backend-api
    ports:
      - "8080:8080"
    depends_on:
      - mongodb
    environment:
      - SPRING_DATA_MONGODB_URI=mongodb://mongodb:27017/library_db
      - JWT_SECRET=9a4f2c8d3e1b7f6a5c4d3e2b1a0f9e8d7c6b5a4f3e2d1c0b9a8f7e6d5c4b3a21
      - CORS_ALLOWED_ORIGINS=http://localhost:3000

  # React Frontend Client Service
  frontend:
    build: ./lms-frontend
    container_name: lms-frontend-ui
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mongo-data:
